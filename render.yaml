services:
  - type: web
    name: vizion-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install uv && UV_PYTHON=3.12 uv sync --frozen
    startCommand: UV_PYTHON=3.12 uv run uvicorn api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: FANOUT_SUBQUERIES
        value: "3"
      - key: USE_LLM_PARAPHRASES
        value: "0"
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: UV_PYTHON
        value: "3.12"
